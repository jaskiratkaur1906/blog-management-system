spring.application.name=blog-management-system

# Show the SQL Hibernate generates
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console - lets you visually browse the DB in a browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep the same in-memory DB name across restarts (easier to reconnect)
spring.datasource.url=jdbc:h2:mem:blogdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
